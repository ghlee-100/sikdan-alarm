name: 어린이집 식단 알림

on:
  schedule:
    - cron: '0 20 * * 1-5'  # 한국시간 오전 7시 (UTC 20시, 월~금)
  workflow_dispatch:

jobs:
  send-meal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: requests 설치
        run: pip install requests

      - name: 식단 알림 실행
        env:
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python sikdan.py
