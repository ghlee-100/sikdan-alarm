name: 어린이집 식단 알림

on:
  schedule:
    - cron: '0 20 * * 0-4'  # 한국시간 오전 5시 (UTC 20시, 일~목 → 한국 월~금)
  workflow_dispatch:

jobs:
  send-meal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: requests 설치
        run: pip install requests

      - name: 식단 알림 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sikdan.py
